services:
  - type: web
    name: ayx-laundry-mvp
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: AYX_SECRET_KEY
        generateValue: true
